// ── 로스터: URL ?a=이름:POS,... 우선, 없으면 최근 게임 팀 ──
function parseTeamParam(s){
  if(!s) return null;
  var out={};
  s.split(',').forEach(function(t){
    var m=t.split(':'); if(m.length===2 && PLAYERS[m[0]] && POSN.indexOf(m[1])>=0) out[m[1]]=m[0];
  });
  return POSN.every(function(p){return out[p];}) ? out : null;
}
function defaultTeams(){
  var g=GAMES[GAMES.length-1];
  function parse(arr){var o={};arr.forEach(function(s){var m=s.match(/^(.+)\(([A-Z]+)\)$/);if(m)o[m[2]]=m[1];});return o;}
  return {a:parse(g.win), b:parse(g.lose), src:'게임 #'+g.no+' ('+g.date+') 팀 구성'};
}
var _q=new URLSearchParams(location.search);
var _pa=parseTeamParam(_q.get('a')), _pb=parseTeamParam(_q.get('b'));
function matchdayTeams(){
  if(typeof MATCHDAY==='undefined'||!MATCHDAY.teams) return null;
  var o={a:{},b:{}};
  POSN.forEach(function(p){ o.a[p]=MATCHDAY.teams.a[p].n; o.b[p]=MATCHDAY.teams.b[p].n; });
  o.src='매치데이 '+MATCHDAY.date+' 로스터';
  return o;
}
var TEAMS = (_pa&&_pb) ? {a:_pa,b:_pb,src:'URL 로스터'} : (matchdayTeams() || defaultTeams());

// ── 유틸 ──
function P(n){ return PLAYERS[n]; }
function streakOf(name){
  var seq=[];
  GAMES.forEach(function(g){
    if(g.win.some(function(s){return _strip(s)===name;})) seq.push(1);
    else if(g.lose.some(function(s){return _strip(s)===name;})) seq.push(0);
  });
  if(!seq.length) return {n:0,w:true};
  var last=seq[seq.length-1],k=0;
  for(var i=seq.length-1;i>=0;i--){ if(seq[i]===last)k++; else break; }
  return {n:k,w:last===1};
}
function h2h(a,b){ // 같은 포지션 맞대결 전적 (a 기준 승)
  var g=0,aw=0;
  GAMES.forEach(function(gm){
    for(var i=0;i<gm.win.length;i++){
      var wn=_strip(gm.win[i]), ln=_strip(gm.lose[i]);
      var wpos=(gm.win[i].match(/\(([^)]+)\)/)||[])[1], lpos=(gm.lose[i].match(/\(([^)]+)\)/)||[])[1];
      if(wpos!==lpos) continue;
      if(wn===a&&ln===b){g++;aw++;}
      if(wn===b&&ln===a){g++;}
    }
  });
  return {games:g,aWins:aw};
}
// 특정 라인에서 사용한 챔피언 기록 (모스트·밴 우선순위용)
function posChamps(name,pos){
  var agg={};
  GAME_DETAILS.forEach(function(g){
    g.players.forEach(function(r){
      if(r.name!==name||r.pos!==pos) return;
      if(!agg[r.champ]) agg[r.champ]={games:0,wins:0};
      agg[r.champ].games++;
      if(r.team==='win') agg[r.champ].wins++;
    });
  });
  return Object.keys(agg).map(function(c){return [c,agg[c]];})
    .sort(function(a,b){return b[1].games-a[1].games||b[1].wins-a[1].wins;});
}
function scPosRecord(name){
  var rec={};
  GAME_DETAILS.forEach(function(g){
    g.players.forEach(function(r){
      if(r.name!==name) return;
      if(!rec[r.pos]) rec[r.pos]=[0,0];
      rec[r.pos][r.team==='win'?0:1]++;
    });
  });
  return rec;
}
function posMean(field,pos){ // 게임 가중 포지션 평균
  var s=0,g=0;
  Object.values(PLAYERS).forEach(function(p){ if(p.pos===pos){s+=p[field]*p.games;g+=p.games;} });
  return g? s/g : 0;
}
function sBadge(g){ return '<span class="sb'+(g>=5?' sb-ok':g>=3?' sb-mid':'')+'">'+g+'판</span>'; }

// ── 라인별 맞대결 ──
function laneSection(){
  var h='<div class="sec"><div class="sec-t">⚔️ 라인별 맞대결</div>';

// ── 밴 우선순위 ──
function banList(team,label,side){

    Object.keys(rec).forEach(function(ps){

    });
  });
  // 최근 3게임 첫 픽 챔프
  var before={}, recent=[];
  GAME_DETAILS.slice(0,-3).forEach(function(g){g.players.forEach(function(r){before[r.name+'|'+r.champ]=1;});});
  GAME_DETAILS.slice(-3).forEach(function(g){g.players.forEach(function(r){
    var names=roster.map(function(x){return x[0];});

      recent.push('🆕 <b class="pn" onclick="goPlayer(\''+r.name+'\')">'+r.name+'</b> — 최근 첫 픽 「'+r.champ+'」 ('+(r.team==='win'?'승':'패')+')');
      before[r.name+'|'+r.champ]=1;

  });});
  var all=items.concat(recent);
  return '<div class="card"><div class="ct">🃏 기습 카드 <span class="ct-sub">예상 밖 요소</span></div>'+
    (all.length?all.map(function(t){return '<div class="obs-row">'+t+'</div>';}).join(''):'<div class="empty">특이 사항 없음</div>')+'</div>';

      var st=streakOf(p.name);
      if(st.n>=3) out.push((st.w?'📈':'📉')+' <b class="pn" onclick="goPlayer(\''+p.name+'\')">'+p.name+'</b> '+st.n+'연'+(st.w?'승 — 기세 유지 중':'패 — 초반 흔들면 무너질 여지')+' '+sBadge(p.games));
      var dm=posMean('d',pos);
      if(p.games>=4 && dm>0 && p.d>dm*1.3) out.push('💀 <b class="pn" onclick="goPlayer(\''+p.name+'\')">'+p.name+'</b> 평균 데스 '+p.d+' (포지션 평균 '+Math.round(dm*10)/10+') — 집중 공략 시 이득 가설 '+sBadge(p.games));
      var vm=POS_AVG[pos]?POS_AVG[pos].VSPM:1;
      if(p.games>=4 && p.vspm<vm*0.7) out.push('👁️ <b class="pn" onclick="goPlayer(\''+p.name+'\')">'+p.name+'</b> 시야 '+p.vspm+' (포지션 기준 '+vm+') — 오브젝트 전 시야 싸움 우위 여지 '+sBadge(p.games));
      var spread=p.cp_best-p.cp_worst;
      if(p.games>=5 && spread>=4) out.push('🎢 <b class="pn" onclick="goPlayer(\''+p.name+'\')">'+p.name+'</b> 기복 큼 (CP '+p.cp_worst+'~'+p.cp_best+') — 초반 흐름이 경기 전체를 좌우 '+sBadge(p.games));
    });
    return '<div class="card"><div class="ct side-'+side+'-t">'+label+' 관찰 포인트</div>'+
      (out.length?out.map(function(t){return '<div class="obs-row">'+t+'</div>';}).join(''):'<div class="empty">두드러진 패턴 없음</div>')+
      '</div>';
  }
  return '<div class="grid2">'+teamObs(TEAMS.a,'A팀','a')+teamObs(TEAMS.b,'B팀','b')+'</div>';
}

// ── 팀 편집 ──
function editSection(){
  function sel(side,pos){
    var cur=TEAMS[side][pos];
    return '<select data-side="'+side+'" data-pos="'+pos+'">'+Object.keys(PLAYERS).sort().map(function(n){
      return '<option'+(n===cur?' selected':'')+'>'+n+'</option>';}).join('')+'</select>';
  }
  return '<div class="card" id="editBox" style="display:none"><div class="ct">팀 편집</div>'+
    '<div class="grid2">'+['a','b'].map(function(s){
      return '<div><div class="ct-sub" style="margin-bottom:6px">'+(s==='a'?'A팀':'B팀')+'</div>'+
        POSN.map(function(p){return '<div class="ed-row"><span>'+POS_KR[p]+'</span>'+sel(s,p)+'</div>';}).join('')+'</div>';
    }).join('')+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:10px"><button class="btn" onclick="scApplyEdit()">적용</button>'+
    '<button class="btn" onclick="scCopyLink()">🔗 로스터 링크 복사</button></div></div>';
}
function scApplyEdit(){
  document.querySelectorAll('#editBox select').forEach(function(s){
    TEAMS[s.dataset.side][s.dataset.pos]=s.value;
  });
  TEAMS.src='수동 편집 로스터';
  var enc=function(t){return POSN.map(function(p){return t[p]+':'+p;}).join(',');};
  history.replaceState(null,'','?a='+encodeURIComponent(enc(TEAMS.a))+'&b='+encodeURIComponent(enc(TEAMS.b)));
  renderScout();
}
function scCopyLink(){
  navigator.clipboard.writeText(location.href).then(function(){alert('로스터 링크가 복사됐어요. 디스코드에 붙여넣으면 모두 같은 리포트를 봐요.');});
}
function scToggleEdit(){ var b=document.getElementById('editBox'); b.style.display=b.style.display==='none'?'block':'none'; }

// ── 렌더 ──
function matchdayGames(){
  if(typeof MATCHDAY==='undefined') return [];
  return GAMES.filter(function(g){ return g.date===MATCHDAY.date; });
}
function teamSideOfWin(g){
  // 승리 5인이 어느 쪽 로스터인지 판별
  var wnames=g.win.map(_strip);
  var aNames=POSN.map(function(p){return TEAMS.a[p];});
  var hits=wnames.filter(function(n){return aNames.indexOf(n)>=0;}).length;
  return hits>=3 ? 'a' : 'b';
}
function resultSection(){
  var mg=matchdayGames();
  if(!mg.length) return '';
  var h='<div class="sec"><div class="sec-t">🏁 경기 결과 — '+MATCHDAY.date+'</div>';
  mg.forEach(function(g){
    var side=teamSideOfWin(g);
    var det=GAME_DETAILS.filter(function(d){return d.no===g.no;})[0];
    var mvp=null,ace=null;
    if(det){
      mvp=det.players.filter(function(p){return p.team==='win';}).sort(function(a,b){return b.cp-a.cp;})[0];
      ace=det.players.filter(function(p){return p.team==='lose';}).sort(function(a,b){return b.cp-a.cp;})[0];
    }
    h+='<div class="card"><div class="ct">게임 #'+g.no+' <span class="ct-sub">'+g.time+' 경기 · '+
      '<b class="side-'+side+'-t">'+(side==='a'?'A팀':'B팀')+' 승리</b></span></div>';
    if(mvp&&ace){
      h+='<div class="grid2" style="margin-bottom:8px">'+
        '<div class="obs-row">👑 <b>MVP</b> <span class="pn" onclick="goPlayer(\''+mvp.name+'\')">'+mvp.name+'</span> — '+mvp.champ+' (CP '+mvp.cp+', '+mvp.k+'/'+mvp.d+'/'+mvp.a+')</div>'+
        '<div class="obs-row">🛡️ <b>ACE</b> <span class="pn" onclick="goPlayer(\''+ace.name+'\')">'+ace.name+'</span> — '+ace.champ+' (CP '+ace.cp+', '+ace.k+'/'+ace.d+'/'+ace.a+')</div></div>';
    }
    if(g.bans&&g.bans.length){
      // 엑셀 기록 관례: 팀1(앞 5개 밴) = 승리팀. blueWin으로 일반화 처리.
      var winBans = (g.blueWin!==false) ? g.bans.slice(0,5) : g.bans.slice(5,10);
      var loseBans = (g.blueWin!==false) ? g.bans.slice(5,10) : g.bans.slice(0,5);
      var loseSide = side==='a' ? 'b' : 'a';
      function banStrip(list){
        return '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px">'+list.map(function(c){
          return '<div style="text-align:center;width:44px"><div style="position:relative;display:inline-block">'+cImg(c,32,6)+
            '<div style="position:absolute;inset:0;border-radius:6px;background:rgba(224,85,85,.15);box-shadow:inset 0 0 0 1px rgba(224,85,85,.4)"></div>'+
            '<div style="position:absolute;top:-4px;right:-4px;font-size:9px">🚫</div></div>'+
            '<div style="font-size:8px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c+'</div></div>';
        }).join('')+'</div>';
      }
      h+='<div class="pc-line" style="margin-bottom:4px"><b class="side-'+side+'-t">'+(side==='a'?'A팀':'B팀')+' 밴</b> <span class="ct-sub">(승리 팀)</span></div>'+banStrip(winBans)+
        '<div class="pc-line" style="margin-bottom:4px"><b class="side-'+loseSide+'-t">'+(loseSide==='a'?'A팀':'B팀')+' 밴</b></div>'+banStrip(loseBans);
    }
    h+='</div>';
  });
  // 이날의 ELO 변동 (지난 업데이트 대비)
  if(typeof ELO_PREV!=='undefined'){
    var rows=[];
    POSN.forEach(function(p){['a','b'].forEach(function(s){
      var n=TEAMS[s][p], pl=P(n); if(!pl) return;
      var prev=ELO_PREV[n]; 
      var d=(prev!=null)?(pl.elo-prev):null;
      rows.push({n:n,s:s,d:d,elo:pl.elo});
    });});
    rows.sort(function(x,y){return (y.d==null?-999:y.d)-(x.d==null?-999:x.d);});
    h+='<div class="card"><div class="ct">📊 이날의 ELO 변동</div><div class="grid2">'+
      rows.map(function(r){
        var tag = r.d==null ? '<span class="sb">NEW</span>' : '<b class="'+(r.d>=0?'up':'down')+'">'+(r.d>=0?'+':'')+r.d+'</b>';
        return '<div class="obs-row"><span class="side-'+r.s+'-t" style="font-weight:800">'+(r.s==='a'?'A':'B')+'</span> <span class="pn" onclick="goPlayer(\''+r.n+'\')">'+r.n+'</span> → ELO '+r.elo+' '+tag+'</div>';
      }).join('')+'</div></div>';
  }
  return h+'</div>';
}
function renderScout(){
  var mg=matchdayGames();
  var phase = mg.length ? '경기 종료 · '+mg.length+'경기 완료' : '경기 전 · 사전 분석';
  var md=(typeof MATCHDAY!=='undefined'&&MATCHDAY.power)?MATCHDAY.power:null;
  var h='';
  h+='<div class="hero"><div class="hero-t">🎮 오늘의 경기</div>'+
    '<div class="hero-s"><b style="color:'+(mg.length?'var(--green)':'var(--gold)')+'">'+phase+'</b> · '+TEAMS.src+' · 총 '+GAMES.length+'게임 데이터 기준</div>'+
    '<button class="btn" style="margin-top:8px" onclick="scToggleEdit()">✏️ 팀 편집 / 링크 공유</button></div>';
  h+=editSection();
  if(md){
    var expA=md.expA;
    h+='<div class="power"><div class="pw side-a-t">A팀 전력 '+md.a.toLocaleString()+'</div>'+
      '<div class="pw-bar"><div class="pw-fill" style="width:'+expA+'%"></div><span>'+expA+'% : '+(100-expA)+'%</span></div>'+
      '<div class="pw side-b-t">B팀 전력 '+md.b.toLocaleString()+'</div></div>'+
      '<div class="note" style="text-align:center;margin-bottom:16px">시딩 점수 기반 기대 승률'+(md.note?' · '+md.note:'')+'</div>';
  } else {
    var eA=POSN.reduce(function(s,p){return s+(P(TEAMS.a[p])?P(TEAMS.a[p]).elo:1000);},0)/5;
    var eB=POSN.reduce(function(s,p){return s+(P(TEAMS.b[p])?P(TEAMS.b[p]).elo:1000);},0)/5;
    var expE=Math.round(100/(1+Math.pow(10,(eB-eA)/400)));
    h+='<div class="power"><div class="pw side-a-t">A팀 평균 ELO '+Math.round(eA)+'</div>'+
      '<div class="pw-bar"><div class="pw-fill" style="width:'+expE+'%"></div><span>'+expE+'% : '+(100-expE)+'%</span></div>'+
      '<div class="pw side-b-t">B팀 평균 ELO '+Math.round(eB)+'</div></div>'+
      '<div class="note" style="text-align:center;margin-bottom:16px">ELO 기반 기대 승률 — 시딩 점수 미입력 시 대체</div>';
  }
  h+=resultSection();
  h+=laneSection();
  h+='<div class="sec"><div class="sec-t">🚫 밴 우선순위</div><div class="grid2">'+
    banList(TEAMS.b,'A팀이 밴할 것 (B팀 주력)','a')+banList(TEAMS.a,'B팀이 밴할 것 (A팀 주력)','b')+'</div></div>';
  h+='<div class="sec"><div class="sec-t">🎯 기습 & 관찰</div>'+surpriseSection()+obsSection()+'</div>';
  h+='<div class="note" style="text-align:center;margin:20px 0">※ 표본이 적은 항목은 판수 뱃지를 확인하세요. 5판+ 녹색 / 3~4판 노랑 / 그 미만 회색은 참고만.</div>';
  document.getElementById('page-scout').innerHTML=h;
  setTimeout(function(){
    POSN.forEach(function(pos,i){
      ['a','b'].forEach(function(s){
        var nm=TEAMS[s][pos], p=P(nm);
        if(p) drawMiniRadar('rd_'+s+i, calcCats(p,p.pos), SC_KEYS, CAT_COLORS);
      });
    });
  },30);
}

// URL에 로스터 파라미터가 있으면 내전 분석 탭으로 자동 진입
if(_pa&&_pb){ showPage('scout'); }

</script>
